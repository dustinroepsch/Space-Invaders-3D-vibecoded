<!DOCTYPE html>
<html lang="en" class="bg-black">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Invaders 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Resume Bevy's AudioContext on every user gesture.
         Runs before the WASM module loads so the constructor is patched
         before cpal/kira creates its AudioContext.

         Three iOS Safari quirks addressed here:
         1. webkitAudioContext must be patched too (older iOS / some current versions).
         2. { once: true } causes a race: if the context doesn't exist yet on the
            first gesture the listener is gone and audio never unlocks. Keep listening.
         3. resume() alone is insufficient — iOS requires a BufferSource to actually
            *start* playing within the gesture handler to fully unlock audio hardware. -->
    <script>
      (function () {
        const OriginalAC = window.AudioContext || window.webkitAudioContext;
        if (!OriginalAC) return;

        const contexts = [];

        function PatchedAudioContext(options) {
          const ctx = new OriginalAC(options);
          contexts.push(ctx);
          return ctx;
        }
        PatchedAudioContext.prototype = OriginalAC.prototype;

        // Patch both names so contexts created via webkitAudioContext are tracked.
        window.AudioContext = PatchedAudioContext;
        if (window.webkitAudioContext) {
          window.webkitAudioContext = PatchedAudioContext;
        }

        function unlockAndResume(ctx) {
          if (ctx.state !== "suspended") return;
          // Play a silent one-sample buffer — required by iOS Safari to fully
          // unlock the audio hardware within a user-gesture handler.
          try {
            const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
            const src = ctx.createBufferSource();
            src.buffer = buf;
            src.connect(ctx.destination);
            src.start(0);
          } catch (_) {}
          ctx.resume().catch(function () {});
        }

        function resumeAll() {
          contexts.forEach(unlockAndResume);
        }

        // Listen on every gesture, not just the first:
        // - The AudioContext may not exist yet when the first gesture fires
        //   (WASM still loading), so once:true would permanently lose the chance.
        // - iOS can re-suspend the context after the page backgrounds.
        ["keydown", "click", "touchstart", "pointerdown"].forEach(function (evt) {
          document.addEventListener(evt, resumeAll, { passive: true });
        });
      })();
    </script>
    <!-- Tell trunk to copy the assets folder into the web dist -->
    <link data-trunk rel="copy-dir" href="assets/" />
    <style>
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body class="bg-black w-full h-full overflow-hidden">

    <!-- Loading screen — hidden once WASM canvas appears -->
    <div id="loading"
         class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black text-green-400 font-mono select-none">
      <p class="text-4xl font-bold tracking-widest mb-6 animate-pulse">INVADERS 3D</p>
      <p class="text-sm tracking-[0.3em] text-green-600">LOADING…</p>
    </div>

    <!-- Mobile touch controls — only rendered on touch devices -->
    <div id="touch-controls"
         class="fixed bottom-8 inset-x-0 z-40 flex items-end justify-between px-8 select-none pointer-events-none"
         style="display: none;">

      <!-- Left / Right -->
      <div class="flex gap-4 pointer-events-auto">
        <button id="btn-left"
                class="w-16 h-16 rounded-full bg-green-900/60 border-2 border-green-500/70 text-green-400 text-2xl active:bg-green-700/80 touch-none"
                aria-label="Move left">◀</button>
        <button id="btn-right"
                class="w-16 h-16 rounded-full bg-green-900/60 border-2 border-green-500/70 text-green-400 text-2xl active:bg-green-700/80 touch-none"
                aria-label="Move right">▶</button>
      </div>

      <!-- Fire -->
      <div class="pointer-events-auto">
        <button id="btn-fire"
                class="w-20 h-20 rounded-full bg-red-900/60 border-2 border-red-500/70 text-red-400 text-sm font-bold tracking-widest active:bg-red-700/80 touch-none"
                aria-label="Fire">FIRE</button>
      </div>
    </div>

    <!-- Trunk injects the WASM bootstrap script here automatically -->
    <script>
      // Hide the loading screen once the canvas is created by Bevy/WASM
      const observer = new MutationObserver(() => {
        if (document.querySelector('canvas')) {
          document.getElementById('loading').style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });

      // Show touch controls only on touch-capable devices
      if (window.matchMedia('(hover: none) and (pointer: coarse)').matches) {
        document.getElementById('touch-controls').style.display = 'flex';
      }

      // Shared state read each frame by Rust via web_sys
      window.touchInput = { left: false, right: false, fire: false };

      function bindButton(id, key) {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', (e) => {
          e.preventDefault();
          window.touchInput[key] = true;
        }, { passive: false });
        ['touchend', 'touchcancel'].forEach((evt) => {
          btn.addEventListener(evt, (e) => {
            e.preventDefault();
            window.touchInput[key] = false;
          }, { passive: false });
        });
      }

      bindButton('btn-left',  'left');
      bindButton('btn-right', 'right');
      bindButton('btn-fire',  'fire');
    </script>
  </body>
</html>
