<!DOCTYPE html>
<html lang="en" class="bg-black">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Invaders 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Resume Bevy's AudioContext on first user gesture.
         Must run before the WASM module loads so we capture the context
         as soon as it's created. -->
    <script>
      (function () {
        const OriginalAudioContext =
          window.AudioContext || window.webkitAudioContext;
        if (!OriginalAudioContext) return;

        const contexts = [];

        function PatchedAudioContext(options) {
          const ctx = new OriginalAudioContext(options);
          contexts.push(ctx);
          return ctx;
        }
        PatchedAudioContext.prototype = OriginalAudioContext.prototype;
        window.AudioContext = PatchedAudioContext;

        function resumeAll() {
          contexts.forEach((ctx) => {
            if (ctx.state === "suspended") ctx.resume();
          });
        }

        ["keydown", "click", "touchstart"].forEach((evt) =>
          document.addEventListener(evt, resumeAll, { once: true })
        );
      })();
    </script>
    <!-- Tell trunk to copy the assets folder into the web dist -->
    <link data-trunk rel="copy-dir" href="assets/" />
    <style>
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body class="bg-black w-full h-full overflow-hidden">

    <!-- Loading screen — hidden once WASM canvas appears -->
    <div id="loading"
         class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black text-green-400 font-mono select-none">
      <p class="text-4xl font-bold tracking-widest mb-6 animate-pulse">INVADERS 3D</p>
      <p class="text-sm tracking-[0.3em] text-green-600">LOADING…</p>
    </div>

    <!-- Mobile touch controls — only rendered on touch devices -->
    <div id="touch-controls"
         class="fixed bottom-8 inset-x-0 z-40 flex items-end justify-between px-8 select-none pointer-events-none"
         style="display: none;">

      <!-- Left / Right -->
      <div class="flex gap-4 pointer-events-auto">
        <button id="btn-left"
                class="w-16 h-16 rounded-full bg-green-900/60 border-2 border-green-500/70 text-green-400 text-2xl active:bg-green-700/80 touch-none"
                aria-label="Move left">◀</button>
        <button id="btn-right"
                class="w-16 h-16 rounded-full bg-green-900/60 border-2 border-green-500/70 text-green-400 text-2xl active:bg-green-700/80 touch-none"
                aria-label="Move right">▶</button>
      </div>

      <!-- Fire -->
      <div class="pointer-events-auto">
        <button id="btn-fire"
                class="w-20 h-20 rounded-full bg-red-900/60 border-2 border-red-500/70 text-red-400 text-sm font-bold tracking-widest active:bg-red-700/80 touch-none"
                aria-label="Fire">FIRE</button>
      </div>
    </div>

    <!-- Trunk injects the WASM bootstrap script here automatically -->
    <script>
      // Hide the loading screen once the canvas is created by Bevy/WASM
      const observer = new MutationObserver(() => {
        if (document.querySelector('canvas')) {
          document.getElementById('loading').style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });

      // Show touch controls only on touch-capable devices
      if (window.matchMedia('(hover: none) and (pointer: coarse)').matches) {
        document.getElementById('touch-controls').style.display = 'flex';
      }

      // Shared state read each frame by Rust via web_sys
      window.touchInput = { left: false, right: false, fire: false };

      function bindButton(id, key) {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', (e) => {
          e.preventDefault();
          window.touchInput[key] = true;
        }, { passive: false });
        ['touchend', 'touchcancel'].forEach((evt) => {
          btn.addEventListener(evt, (e) => {
            e.preventDefault();
            window.touchInput[key] = false;
          }, { passive: false });
        });
      }

      bindButton('btn-left',  'left');
      bindButton('btn-right', 'right');
      bindButton('btn-fire',  'fire');
    </script>
  </body>
</html>
